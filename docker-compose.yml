services:
  postgres:
    image: postgres:15
    container_name: batch-stock-ml-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: stocks
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d stocks"]
      interval: 5s
      timeout: 3s
      retries: 20

  airflow:
    image: apache/airflow:2.9.3
    container_name: batch-stock-ml-airflow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      # Airflow metadata DB (this is fine with +psycopg2)
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://user:pass@postgres:5432/stocks
      # ✅ Clean runtime connection for tasks: creates conn_id=pg_url with proper conn_type "postgres"
      AIRFLOW_CONN_PG_URL: postgres://user:pass@postgres:5432/stocks
      # optional: if you want postgres_default too (safe format)
      AIRFLOW_CONN_POSTGRES_DEFAULT: postgres://user:pass@postgres:5432/stocks
      _PIP_ADDITIONAL_REQUIREMENTS: "-r /opt/airflow/requirements.txt"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/requirements.txt:/opt/airflow/requirements.txt
      - ./scripts:/opt/airflow/scripts
      - ./landing:/opt/airflow/landing
      - ./sql:/opt/airflow/sql
    ports:
      - "8080:8080"
    command: >
      bash -lc "pip install --no-cache-dir -r /opt/airflow/requirements.txt &&
      airflow db init &&
      airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin || true &&
      airflow webserver -p 8080 & exec airflow scheduler"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  pgdata:
